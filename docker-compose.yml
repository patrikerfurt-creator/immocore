services:
  db:
    image: postgres:16-alpine
    container_name: immocore_db
    environment:
      POSTGRES_DB: immocore
      POSTGRES_USER: immocore
      POSTGRES_PASSWORD: immocore
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: immocore_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: immocore_backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      SECRET_KEY: django-immocore-dev-secret-key-change-in-production-2026
      DEBUG: "True"
      DB_NAME: immocore
      DB_USER: immocore
      DB_PASSWORD: immocore
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - ./CamtDAT:/app/camt_dat
      - ./Rechnungen:/app/rechnungen
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
    container_name: immocore_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      SECRET_KEY: django-immocore-dev-secret-key-change-in-production-2026
      DEBUG: "True"
      DB_NAME: immocore
      DB_USER: immocore
      DB_PASSWORD: immocore
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./CamtDAT:/app/camt_dat
      - ./Rechnungen:/app/rechnungen
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
    container_name: immocore_celery_beat
    command: celery -A config beat --loglevel=info
    environment:
      SECRET_KEY: django-immocore-dev-secret-key-change-in-production-2026
      DEBUG: "True"
      DB_NAME: immocore
      DB_USER: immocore
      DB_PASSWORD: immocore
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: immocore_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_media:
